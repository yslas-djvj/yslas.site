<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>YSLAS</title>
	<meta name="description" content="DJ/VJ Duo based out of Houston/San Diego.">
	<link rel="icon" href="assets/img/favicon.ico">
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<header class="site-header"></header>

	<!-- hero: full-screen graphic, animated static overlay, scaled wordmark -->
	<section class="hero">
		<div class="grain"></div>
		<div class="scaled-text">YSLAS</div>
	</section>

	<!-- two-up crystal gallery, full bleed with no gaps. Each image is its own
	     concentric-ring parallax host; the <img> inside is the no-JS fallback -->
	<section class="gallery-2 theme-light">
		<div class="parallax" data-img="assets/img/yslas-crystal-1-square-bitmap.jpg">
			<img src="assets/img/yslas-crystal-1-square-bitmap.jpg" alt="Yslas crystal graphic 1">
		</div>
		<div class="parallax" data-img="assets/img/yslas-crystal-2-square-bitmap.jpg">
			<img src="assets/img/yslas-crystal-2-square-bitmap.jpg" alt="Yslas crystal graphic 2">
		</div>
	</section>

	<!-- NEW: newest release cover, links out to the release -->
	<section class="home-new">
		<h1 class="new-title">NEW</h1>
		<div class="release-cover">
			<a href="https://tr.ee/vqnrRS0OUF" target="_blank" rel="noopener">
				<img src="assets/img/yatik-cover.jpg" alt="Yatik &mdash; newest YSLAS release">
			</a>
		</div>
	</section>

	<footer class="site-foot"></footer>
	<script src="js/site.js"></script>
</body>
</html>
